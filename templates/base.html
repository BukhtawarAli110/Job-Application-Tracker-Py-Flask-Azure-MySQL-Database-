<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>JApp Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h1><a href="{{ url_for('index') }}">Job Tracker</a></h1>
    <nav>
      <a class="btn primary" href="{{ url_for('new') }}">+ New Application</a>
      <form method="post" action="{{ url_for('trigger_reminders') }}" style="display:inline;">
        <button class="btn" type="submit">Send Reminder Email Now</button>
      </form>
      <a class="btn subtle" href="{{ url_for('logout') }}">Log out</a>
    </nav>
  </header>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-wrap">
        {% for category, msg in messages %}
          <div class="flash {{ category }}">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
